variables:
    ANA_USE_UPF:
        description: > 
            Do the verilog models support ANA_USE_UPF
        variable_type: boolean
        default: False

    APACHE_VERSION:
        description: > 
            Version of Apache Redhawk for your models
        variable_type: scalar
        validation_regex: '.*'
        default: generic

    AdditionalDefFiles:
        description: > 
            List any additional DEF files delivered for this block in addition to the top DEF file. 
        variable_type: list
        validation_regex: '[-+.\w]+(/[-+.\w]+)*[.]def[.]gz'
        default: []

    AdditionalRdbFiles:
        description: > 
            List any additional RDB files delivered for this block in addition to the man RDB file. 
        variable_type: list
        validation_regex: '[-+.\w]+(/[-+.\w]+)*[.](rdb)'
        default: []

    AdditionalUpfFiles:
        description: > 
            List any additional UPF files delivered for this block in addition to the top UPF file. Allow only .upf and .tcl files as additional files 
        variable_type: list
        validation_regex: '[-+.\w]+(/[-+.\w]+)*[.](tcl|upf)'
        default: []

    ApacheTempCorners:
        description: > 
            List of Temp corners for Apache tools
        variable_type: list
        default: ['-40', '125']
        constant: True

    ApacheXtorCorners:
        description: > 
            List of Xtor corners for Apache tools
        variable_type: list
        default: ['ss', 'ff']
        constant: True

    CALIBRE_VERSION:
        description: > 
            Version of Calibre for your models
        variable_type: scalar
        validation_regex: '.*'
        default: generic

    CONSTRAINT_TYPE:
        description: > 
            type of constraints (used for SDC deliverables). Note that it is not constant
        variable_type: list
        validation_regex: '[-+.\w]+'
        default: ['functional', 'dft']

    DEF_VERSION:
        description: > 
            Version of DEF for your models
        variable_type: scalar
        validation_regex: '.*'
        default: generic

    DeratedModelsAllowed7ff:
        description: > 
            Indicates if the derated models are allowed. This is used for inital 7nm deliveries onlyi (default set to false in 2.6). 
        variable_type: boolean
        default: False

    ECPM_VERSION:
        description: > 
            Version of ECPM (Excel Chip Power Metric) for your models
        variable_type: scalar
        validation_regex: '.*'
        default: generic

    ENC_WITHPOWER_EXT:
        description: > 
            List of power extension types that could be encoded  
        variable_type: list
        default: ['enc', 'with_power_enc', 'with_pgb_power_enc']
        constant: True

    EcpmSimulationMode:
        description: > 
            List of simulation modes for ECPM
        variable_type: list
        default: ['max', 'power_optimization', 'idle', 'lifetime']
        constant: True

    EcpmTxtFileType:
        description: > 
            List of ECPM text file types
        variable_type: list
        default: ['PM', 'cap', 'tran', 'detail']
        constant: True

    FASTSCAN_VERSION:
        description: > 
            Version of Fastscan for your models
        variable_type: scalar
        validation_regex: '.*'
        default: generic

    ForAPD:
        description: > 
            Indicates that the block is intended for the APD customer - i.e., the customer that normally uses APD.yaml for dtreespec 
        variable_type: boolean
        default: False

    FusaLevel:
        description: > 
            Functional safety level   
        variable_type: list
        default: ['in-context', 'out-of-context', 'proven-in-use', 'proven-through-analysis']
        constant: True

    FusaSubLevel:
        description: > 
            Functional safety sub-level   
        variable_type: list
        default: ['A', 'B', 'C', 'D']
        constant: True

    GDS_VERSION:
        description: > 
            Version of GDS for your models
        variable_type: scalar
        validation_regex: '.*'
        default: generic

    GenericDocPDF:
        description: > 
            List of extra PDF Docs
        variable_type: list
        default: ['generic1', 'generic2', 'generic3', 'generic4', 'generic5', 'generic6', 'generic7', 'generic8', 'generic9']
        constant: True

    HERCULES_VERSION:
        description: > 
            Version of HERCULES for your models
        variable_type: scalar
        validation_regex: '.*'
        default: generic

    IBIS_EXTENSION:
        description: > 
            IBIS file extension
        variable_type: list
        default: ['ibis', 'ibs']
        constant: True

    IBIS_VERSION:
        description: > 
            Version of IBIS
        variable_type: scalar
        validation_regex: '.*'
        default: generic

    IPName:
        description: > 
            Name of the IP. Same value as specfied in the ipxci.txt input. 
        variable_type: scalar
        validation_regex: '.*'
        
    imp_product_division:
        description: > 
            IP Product divison detals. 
        variable_type: scalar
        validation_regex: '.*'

    IP_IOPackage:
        description: > 
            Date code for the IP library package - (example someIOLIBNAME.iopads.someDATECODE.tar.gz) 
        variable_type: list
        validation_regex: '[-+._\w]+[.]iopads[.][0-9]+[.]tar[.]gz'
        default: []

    IP_MemPackage:
        description: > 
            Name of the IP library - (example someMEMLIBNAME.memories.someDATECODE) 
        variable_type: list
        validation_regex: '[-+.\w]+[.]memories[.][0-9]+[.]tar[.]gz'
        default: []

    IP_RevID:
        description: > 
            Username cell name for IP library package  
        variable_type: list
        validation_regex: '[-+._\w]+[.]tar[.]gz'
        default: []

    LEF_VERSION:
        description: > 
            Version of LEF for your models
        variable_type: scalar
        validation_regex: '.*'
        default: generic

    LOGICVISION_VERSION:
        description: > 
            Version of Logicvision for your models
        variable_type: scalar
        validation_regex: '.*'
        default: generic

    LayoutFormat:
        description: > 
            Set the layout format: either OASIS or GDS are supported, but not both at the same time 
        variable_type: scalar
        value_list: ['oas', 'gds']
        default: oas

    LibCorners130hv:
        description: > 
            List of all liberty corners in 130hv. 
        variable_type: list
        default: ['ff165-40', 'ff165025', 'ff165125', 'ss108-40', 'ss135-40', 'ss108000', 'ss135000', 'ss108125', 'ss135125', 'tt150025', 'tt150085']
        constant: True

    LibCorners16ff:
        description: > 
            List of all liberty corners in 16ff 
        variable_type: list
        default: ['ff050-40', 'ff059-40', 'ff064-40', 'ff072-40', 'ff080-40', 'ff088-40', 'ff098-40', 'ff050125', 'ff059125', 'ff064125', 'ff072125', 'ff080125', 'ff088125', 'ff098125', 'ss064-40', 'ss072-40', 'ss080-40', 'ss088-40', 'ss098-40', 'ss064000', 'ss072000', 'ss080000', 'ss088000', 'ss098000', 'ss064125', 'ss072125', 'ss080125', 'ss088125', 'ss098125', 'tt050-40', 'tt064-40', 'tt072-40', 'tt080-40', 'tt050025', 'tt054025', 'tt059025', 'tt064025', 'tt072025', 'tt080025', 'tt088025', 'tt050110', 'tt059110', 'tt064110', 'tt072110', 'tt080110', 'tt088110', 'tt098110']
        constant: True

    LibCorners16ffc:
        description: > 
